<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyber Risk Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    button {
      background: #2563eb;
      border: none;
      color: white;
      padding: 14px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 30px;
    }

    .cards {
      display: none;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .critical {
      background: #dc2626;
    }

    .high {
      background: #ea580c;
    }

    .medium {
      background: #ca8a04;
    }

    table {
      width: 100%;
      background: white;
      color: black;
      border-collapse: collapse;
      display: none;
      margin-bottom: 30px;
    }

    table th,
    table td {
      border: 1px solid #ccc;
      padding: 12px;
    }

    .report-box {
      display: none;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
    }

    .submit-btn {
      background: #16a34a;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Cyber Risk & Vulnerability Dashboard</h1>

  <button onclick="runScan()">Run Security Scan</button>

  <div class="cards" id="cards">

    <div class="card critical">
      <h2>Critical</h2>
      <p>1</p>
    </div>

    <div class="card high">
      <h2>High</h2>
      <p>1</p>
    </div>

    <div class="card medium">
      <h2>Medium</h2>
      <p>1</p>
    </div>

  </div>

  <table id="table">
    <tr>
      <th>Vulnerability</th>
      <th>Severity</th>
    </tr>

    <tr>
      <td>SQL Injection</td>
      <td>Critical</td>
    </tr>

    <tr>
      <td>Weak Password Policy</td>
      <td>High</td>
    </tr>

    <tr>
      <td>Open Port Detected</td>
      <td>Medium</td>
    </tr>
  </table>

  <div class="report-box" id="reportBox">

    <h2>Incident Report</h2>

    <input type="text" placeholder="Incident Title">

    <textarea placeholder="Describe the issue..."></textarea>

    <button class="submit-btn">
      Submit Report
    </button>

  </div>

</div>

<script>

function runScan() {

  document.getElementById("cards").style.display = "flex";

  document.getElementById("table").style.display = "table";

  document.getElementById("reportBox").style.display = "block";
}

</script>

</body>
</html>
